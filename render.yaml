services:
  - type: web
    name: adora-backend
    env: python
    region: oregon
    plan: standard
    
    # Use the backend directory as the root
    rootDir: backend
    
    # Build command
    buildCommand: pip install -r requirements.txt
    
    # Start command - use gunicorn for production
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT main:app --access-logfile - --error-logfile -
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DERIV_API_TOKEN
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
    
    # Auto-deploy on push to main
    autoDeploy: true
